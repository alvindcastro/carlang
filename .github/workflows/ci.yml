name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Run tests
        run: go test ./...

      - name: Run Hello World through interpreter
        run: |
          output="$(go run ./cmd/carl run examples/hello_world.carl)"
          test "$output" = "Hello, World!"

      - name: Run Hello World through compiler and VM
        run: |
          mkdir -p dist
          go run ./cmd/carl compile examples/hello_world.carl -o dist/hello_world.cbc
          output="$(go run ./cmd/carl vm dist/hello_world.cbc)"
          test "$output" = "Hello, World!"
